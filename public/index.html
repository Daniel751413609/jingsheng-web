<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
<title>精盛清潔 — 單據產生器</title>
<style>
  :root {
    --bg: #f5ede3;
    --card: #fff;
    --accent: #6b5a4e;
    --accent2: #c8b9aa;
    --text: #3a2d24;
    --muted: #7a6a5e;
    --border: #ddd0c4;
    --danger: #c0392b;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: "PingFang TC", "Hiragino Sans GB", "Microsoft JhengHei", sans-serif;
    background: var(--bg); color: var(--text);
    min-height: 100vh; padding: 0 0 40px;
  }
  header {
    background: var(--accent); color: #fff;
    padding: 18px 20px 14px;
    text-align: center;
  }
  header h1 { font-size: 17px; letter-spacing: .12em; font-weight: 400; }
  header p  { font-size: 11px; opacity: .7; margin-top: 4px; letter-spacing: .08em; }

  .container { max-width: 560px; margin: 0 auto; padding: 20px 16px; }

  /* 類型切換 */
  .type-toggle {
    display: flex; border-radius: 8px; overflow: hidden;
    border: 1.5px solid var(--accent); margin-bottom: 24px;
  }
  .type-toggle label {
    flex: 1; text-align: center; padding: 12px 0;
    font-size: 15px; font-weight: 600; cursor: pointer;
    background: #fff; color: var(--accent);
    transition: background .15s, color .15s;
  }
  .type-toggle input[type=radio] { display: none; }
  .type-toggle input:checked + label {
    background: var(--accent); color: #fff;
  }

  /* 卡片區塊 */
  .card {
    background: #fff; border-radius: 10px;
    padding: 18px 16px; margin-bottom: 16px;
    box-shadow: 0 1px 4px rgba(0,0,0,.06);
  }
  .card-title {
    font-size: 12px; font-weight: 700; letter-spacing: .08em;
    color: var(--muted); margin-bottom: 14px; text-transform: uppercase;
  }

  /* 表單元素 */
  label.field-label {
    display: block; font-size: 13px; color: var(--muted);
    margin-bottom: 5px; margin-top: 14px;
  }
  label.field-label:first-of-type { margin-top: 0; }
  input[type=text], input[type=date], textarea {
    width: 100%; padding: 11px 13px; border: 1.5px solid var(--border);
    border-radius: 7px; font-size: 15px; color: var(--text);
    background: #faf7f4; outline: none;
    font-family: inherit;
    transition: border-color .15s;
  }
  input:focus, textarea:focus { border-color: var(--accent); }
  textarea { resize: vertical; min-height: 72px; }

  /* 品項列 */
  .item-row {
    display: grid; grid-template-columns: 1fr 72px 100px 32px;
    gap: 8px; align-items: center; margin-bottom: 10px;
  }
  .item-row input { margin: 0; }
  .item-row .col-label {
    font-size: 11px; color: var(--muted); text-align: center;
  }
  .item-header {
    display: grid; grid-template-columns: 1fr 72px 100px 32px;
    gap: 8px; margin-bottom: 6px;
  }
  .btn-remove {
    background: none; border: 1.5px solid var(--danger);
    color: var(--danger); border-radius: 6px;
    width: 32px; height: 38px; font-size: 18px; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
  }
  .btn-add {
    width: 100%; padding: 10px; margin-top: 8px;
    border: 1.5px dashed var(--accent2); border-radius: 7px;
    background: none; color: var(--muted); font-size: 14px;
    cursor: pointer; font-family: inherit;
  }
  .btn-add:hover { border-color: var(--accent); color: var(--accent); }

  /* 送出按鈕 */
  .btn-submit {
    width: 100%; padding: 16px; border: none; border-radius: 10px;
    background: var(--accent); color: #fff;
    font-size: 17px; font-weight: 700; letter-spacing: .06em;
    cursor: pointer; font-family: inherit; margin-top: 8px;
    transition: opacity .15s;
  }
  .btn-submit:disabled { opacity: .5; cursor: not-allowed; }

  /* 狀態訊息 */
  .status {
    text-align: center; padding: 12px; border-radius: 8px;
    font-size: 14px; margin-top: 12px; display: none;
  }
  .status.loading { background: #f0ede8; color: var(--muted); display: block; }
  .status.error   { background: #fdecea; color: var(--danger); display: block; }
</style>
</head>
<body>

<header>
  <h1>精 盛 清 潔 有 限 公 司</h1>
  <p>單據產生器</p>
</header>

<div class="container">

  <!-- 類型切換 -->
  <div class="type-toggle">
    <input type="radio" name="type" id="t-quote" value="quote" checked>
    <label for="t-quote">報 價 單</label>
    <input type="radio" name="type" id="t-invoice" value="invoice">
    <label for="t-invoice">請 款 單</label>
  </div>

  <!-- 基本資料 -->
  <div class="card">
    <div class="card-title">基本資料</div>

    <label class="field-label">客戶名稱 *</label>
    <input type="text" id="client" placeholder="例：日台設計">

    <label class="field-label">施作地址</label>
    <input type="text" id="address" placeholder="例：台北市松山區民生東路三段145號">

    <label class="field-label">日期</label>
    <input type="date" id="date">
  </div>

  <!-- 品項 -->
  <div class="card">
    <div class="card-title">品項</div>
    <div class="item-header">
      <span class="col-label" style="text-align:left">名稱</span>
      <span class="col-label">數量</span>
      <span class="col-label">單價</span>
      <span></span>
    </div>
    <div id="items"></div>
    <button class="btn-add" onclick="addItem()">＋ 新增品項</button>
  </div>

  <!-- 備註 -->
  <div class="card">
    <div class="card-title">備註（每行一條）</div>
    <textarea id="notes"></textarea>
  </div>

  <button class="btn-submit" id="btn-submit" onclick="generate()">產 生 PDF</button>
  <div class="status" id="status"></div>

</div>

<script>
// 預設今天日期（台北）
const today = new Date().toLocaleDateString('sv-SE', { timeZone: 'Asia/Taipei' });
document.getElementById('date').value = today;

// 預設備註
const DEFAULT_NOTES = {
  quote:   '本報價單有效期為 30 天。\n確認接受報價後請簽署回傳。',
  invoice: '請於請款單開立後 60 日內完成付款。\n匯款後請來電或來訊確認,謝謝。',
};

const notesEl = document.getElementById('notes');
notesEl.value = DEFAULT_NOTES.quote;

// 切換類型時，若備註未被手動改過，跟著更新預設
document.querySelectorAll('input[name=type]').forEach(radio => {
  radio.addEventListener('change', () => {
    const cur = notesEl.value.trim();
    const isDefault = Object.values(DEFAULT_NOTES).some(d => d === cur);
    if (isDefault) notesEl.value = DEFAULT_NOTES[radio.value];
  });
});

// 初始一個空品項
addItem();

function addItem(name = '', qty = 1, unit_price = '') {
  const container = document.getElementById('items');
  const row = document.createElement('div');
  row.className = 'item-row';
  row.innerHTML = `
    <input type="text"   placeholder="品項名稱" value="${name}"       class="i-name">
    <input type="number" placeholder="數量"     value="${qty}"        class="i-qty"  min="1">
    <input type="number" placeholder="單價"     value="${unit_price}" class="i-price" min="0">
    <button class="btn-remove" onclick="this.closest('.item-row').remove()">×</button>
  `;
  container.appendChild(row);
}

async function generate() {
  const client = document.getElementById('client').value.trim();
  if (!client) { alert('請填入客戶名稱'); return; }

  const type    = document.querySelector('input[name=type]:checked').value;
  const address = document.getElementById('address').value.trim();
  const dateVal = document.getElementById('date').value.replace(/-/g, '/');
  const notesRaw = document.getElementById('notes').value.trim();
  const notes = notesRaw ? notesRaw.split('\n').map(s => s.trim()).filter(Boolean) : [];

  const itemRows = document.querySelectorAll('.item-row');
  const items = [];
  for (const row of itemRows) {
    const name       = row.querySelector('.i-name').value.trim();
    const qty        = Number(row.querySelector('.i-qty').value);
    const unit_price = Number(row.querySelector('.i-price').value);
    if (!name || !unit_price) continue;
    items.push({ name, qty: qty || 1, unit_price });
  }
  if (!items.length) { alert('請至少填一個品項'); return; }

  const btn    = document.getElementById('btn-submit');
  const status = document.getElementById('status');
  btn.disabled = true;
  status.className = 'status loading';
  status.textContent = '產生中，請稍候…';

  try {
    const res = await fetch('/api/generate', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ type, client, address, date: dateVal, items, notes }),
    });
    if (!res.ok) throw new Error(`伺服器錯誤 ${res.status}`);

    const blob = await res.blob();
    const url  = URL.createObjectURL(blob);
    const a    = document.createElement('a');
    const cd   = res.headers.get('Content-Disposition') || '';
    const m    = cd.match(/filename\*=UTF-8''(.+)/);
    a.download  = m ? decodeURIComponent(m[1]) : 'document.pdf';
    a.href = url;
    a.click();
    URL.revokeObjectURL(url);
    status.className = 'status';
  } catch (e) {
    status.className = 'status error';
    status.textContent = '產生失敗：' + e.message;
  } finally {
    btn.disabled = false;
  }
}
</script>
</body>
</html>
